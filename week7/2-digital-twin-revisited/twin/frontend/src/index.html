<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat with Digital Twin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #1e293b;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.25rem;
    }
    #chat-container {
      max-width: 700px;
      margin: 2rem auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      padding: 1rem;
      height: 70vh;
      overflow-y: auto;
    }
    .message {
      margin: 0.5rem 0;
      padding: 0.75rem;
      border-radius: 8px;
      max-width: 80%;
      white-space: pre-wrap;
    }
    .user {
      background-color: #d1fae5;
      align-self: flex-end;
      margin-left: auto;
    }
    .assistant {
      background-color: #e0e7ff;
      align-self: flex-start;
      margin-right: auto;
    }
    #input-container {
      display: flex;
      max-width: 700px;
      margin: 1rem auto;
      padding: 0 1rem;
    }
    input[type="text"] {
      flex-grow: 1;
      padding: 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-left: 0.5rem;
      padding: 0.75rem 1rem;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>

<header>Chat with the Digital Twin of <span id="jobseeker-name"></span></header>

<div id="chat-container"></div>

<div id="input-container">
  <input type="text" id="prompt" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  // 🌟 Set the jobseeker's name here
  const jobseekerName = "Alex Miller";
  document.getElementById("jobseeker-name").textContent = jobseekerName;

  const chatContainer = document.getElementById("chat-container");

  function appendMessage(role, text) {
    const msg = document.createElement("div");
    msg.classList.add("message", role);
    msg.textContent = text;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  async function loadChatHistory() {
    const res = await fetch('/api/chat');
    const data = await res.json();
    data.messages.forEach(msg => {
      const text = msg.content.map(c => c.text).join("\n");
      appendMessage(msg.role, text);
    });
  }

  async function sendMessage() {
    const promptInput = document.getElementById("prompt");
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    appendMessage("user", prompt);
    promptInput.value = "";

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let assistantMsg = '';
    appendMessage("assistant", ""); // create a placeholder

    let assistantDiv = chatContainer.querySelector(".message.assistant:last-child");

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      assistantMsg += chunk;
      assistantDiv.textContent = assistantMsg;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  }

  // Load initial messages
  loadChatHistory();
</script>

</body>
</html>
